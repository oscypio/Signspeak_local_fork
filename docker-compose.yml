version: '3.8'

services:

  signspeak-backend:
    build:
      context: ./SignSpeakBackend
      dockerfile: Dockerfile
    container_name: signspeak-backend
    ports:
      - "8080:8080"

#  signspeak-frontend:
#    build:
#      context: ./signspeak-frontend
#      dockerfile: Dockerfile
#    container_name: signspeak-frontend
#    ports:
#      - "5173:80"
#    depends_on:
#      - signspeak-backend

  signspeak-frontend:
    build:
      context: ./signspeak-frontend
      dockerfile: Dockerfile.dev
    container_name: signspeak-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./signspeak-frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - signspeak-backend
